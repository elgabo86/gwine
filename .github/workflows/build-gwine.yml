name: build-gwine

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build-gwine:
    name: Build gwine
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: artixlinux/artixlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          pacman-key --init
          pacman-key --populate artix
          sed -i 's/^ID=artix$/ID=arch/' /etc/os-release
          printf '%s\n' 'Server = https://artix.wheaton.edu/repos/$repo/os/$arch' 'Server = https://artix.unixpeople.org/repos/$repo/os/$arch' 'Server = https://mirror.clarkson.edu/artix-linux/repos/$repo/os/$arch' > /etc/pacman.d/mirrorlist
          printf '\n[lib32]\nInclude = /etc/pacman.d/mirrorlist\n' >> /etc/pacman.conf
          pacman -Sy --noconfirm --needed base-devel git curl tar

      - name: Clone wine-tkg-git repo and configure
        working-directory: /home/runner/work/
        run: |
          git clone https://github.com/Frogging-Family/wine-tkg-git.git
          curl -L "https://raw.githubusercontent.com/gohryt/wine-tkg-git/gohryt-1/wine-tkg-git/wine-tkg-patches/proton-tkg-specific/proton-sdl-joy/proton10-sdl-joy.patch" -o wine-tkg-git/wine-tkg-git/wine-tkg-patches/proton-tkg-specific/proton-sdl-joy/proton10-sdl-joy.patch
          curl -L "https://raw.githubusercontent.com/gohryt/wine-tkg-git/gohryt-1/wine-tkg-git/wine-tkg-patches/proton-tkg-specific/proton_eac/Revert-ntdll-Get-rid-of-the-wine_nt_to_unix_file_nam.patch" -o wine-tkg-git/wine-tkg-git/wine-tkg-patches/proton-tkg-specific/proton_eac/Revert-ntdll-Get-rid-of-the-wine_nt_to_unix_file_nam.patch
          cd wine-tkg-git/wine-tkg-git
          sed -i 's/_use_ntsync="false"/_use_ntsync="true"/g' customization.cfg
          sed -i 's/_use_fsync="true"/_use_fsync="false"/g' customization.cfg
          sed -i 's/_use_esync="true"/_use_esync="false"/g' customization.cfg
          sed -i 's/_wayland_driver="false"/_wayland_driver="true"/g' customization.cfg
          sed -i 's/_FS_bypass_compositor="false"/_FS_bypass_compositor="true"/g' customization.cfg
          sed -i 's/_proton_fs_hack="false"/_proton_fs_hack="true"/g' customization.cfg
          sed -i 's/_proton_mf_patches="false"/_proton_mf_patches="true"/g' customization.cfg
          sed -i 's/_msvcrt_nativebuiltin="false"/_msvcrt_nativebuiltin="true"/g' customization.cfg
          sed -i 's/_win10_default="false"/_win10_default="true"/g' customization.cfg
          sed -i 's/_protonify="false"/_protonify="true"/g' customization.cfg
          sed -i 's/_NOLIB32="false"/_NOLIB32="wow64"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_NOCCACHE="false"/_NOCCACHE="true"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_PKGNAME_OVERRIDE=""/_PKGNAME_OVERRIDE="none"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_sdl_joy_support="false"/_sdl_joy_support="true"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_user_patches_no_confirm="false"/_user_patches_no_confirm="true"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_build_faudio="false"/_build_faudio="true"/g' customization.cfg
          sed -i 's/pacman -S\${_confirm_str} --needed/pacman -S\${_confirm_str} --needed --noconfirm/' wine-tkg-scripts/deps

      - name: Copy custom patches
        working-directory: /home/runner/work/
        run: |
          if [ -d "$GITHUB_WORKSPACE/patches" ]; then
            cp "$GITHUB_WORKSPACE/patches"/*.mypatch wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/ 2>/dev/null || true
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/winegstreamer_nv12_buffer_fix.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/opencl_linux_fix.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/use_real_username.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/content_sniffing_fallback.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/mpeg4_m4s2_decoder_fix.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/mfplat_buffer_stride_fix.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/disable_mediaconv_fallback.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/cpuid_fault_handler.mypatch
            echo "Removed proton-specific patches for gwine build"
          fi

      - name: Start build
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/
        run: |
          ( yes | ./non-makepkg-build.sh ) || true
          if ls -d non-makepkg-builds/wine-tkg* 1>/dev/null 2>&1; then
            echo "Build directory found - build successful"
          else
            echo "::error::Build failed - no output directory found. Check prepare.log below."
            find / -maxdepth 5 -name "prepare.log" -path "*/wine-tkg*" -exec cat {} \; 2>/dev/null || echo "prepare.log not found"
            exit 1
          fi

      - name: Show prepare.log on failure
        if: failure()
        run: |
          echo "=== prepare.log ==="
          PREPARE_LOG=$(find / -maxdepth 5 -name "prepare.log" -path "*/wine-tkg*" 2>/dev/null | head -1)
          if [ -n "$PREPARE_LOG" ]; then cat "$PREPARE_LOG"; else echo "prepare.log not found"; fi
          echo "=== End of prepare.log ==="

      - name: Package
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/non-makepkg-builds/
        run: |
          BUILD_DIR=$(ls -d wine-tkg-git-*.g* | head -n 1)
          VERSION=$(echo "$BUILD_DIR" | sed 's/^wine-tkg-git-//')
          mv "$BUILD_DIR" "gwine-$VERSION"
          tar cJvf "gwine-$VERSION.tar.xz" "gwine-$VERSION"
          mv "gwine-$VERSION.tar.xz" "/tmp/gwine-$VERSION.tar.xz"
          echo "EXTRACTED_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "gwine-${{ env.EXTRACTED_VERSION }}"
          name: "Gwine ${{ env.EXTRACTED_VERSION }}"
          files: "/tmp/gwine-${{ env.EXTRACTED_VERSION }}.tar.xz"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const gwineReleases = releases
              .filter(r => r.tag_name.startsWith('gwine-') && !r.tag_name.startsWith('gwine-proton-'))
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            const releasesToDelete = gwineReleases.slice(3);

            for (const release of releasesToDelete) {
              console.log(`Deleting ${release.tag_name} (${release.name})`);
              await github.rest.repos.deleteRelease({ owner: context.repo.owner, repo: context.repo.repo, release_id: release.id });
              try {
                await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${release.tag_name}` });
              } catch (error) { console.log(`Cannot delete tag ${release.tag_name}: ${error.message}`); }
            }
