name: build-gwine

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build-gwine:
    name: Build gwine
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: artixlinux/artixlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          pacman-key --init
          pacman-key --populate artix
          sed -i 's/^ID=artix$/ID=arch/' /etc/os-release
          printf '%s\n' 'Server = https://artix.wheaton.edu/repos/$repo/os/$arch' 'Server = https://artix.unixpeople.org/repos/$repo/os/$arch' 'Server = https://mirror.clarkson.edu/artix-linux/repos/$repo/os/$arch' > /etc/pacman.d/mirrorlist
          printf '\n[lib32]\nInclude = /etc/pacman.d/mirrorlist\n' >> /etc/pacman.conf
          pacman -Sy --noconfirm --needed base-devel git curl tar

      - name: Clone wine-tkg-git repo and configure
        working-directory: /home/runner/work/
        run: |
          git clone https://github.com/Frogging-Family/wine-tkg-git.git
          cd wine-tkg-git/wine-tkg-git
          sed -i 's/_use_ntsync="false"/_use_ntsync="true"/g' customization.cfg
          sed -i 's/_use_fsync="true"/_use_fsync="false"/g' customization.cfg
          sed -i 's/_use_esync="true"/_use_esync="false"/g' customization.cfg
          sed -i 's/_wayland_driver="false"/_wayland_driver="true"/g' customization.cfg
          sed -i 's/_FS_bypass_compositor="false"/_FS_bypass_compositor="true"/g' customization.cfg
          sed -i 's/_proton_fs_hack="false"/_proton_fs_hack="true"/g' customization.cfg
          sed -i 's/_proton_mf_patches="false"/_proton_mf_patches="true"/g' customization.cfg
          sed -i 's/_msvcrt_nativebuiltin="false"/_msvcrt_nativebuiltin="true"/g' customization.cfg
          sed -i 's/_win10_default="false"/_win10_default="true"/g' customization.cfg
          sed -i 's/_protonify="false"/_protonify="true"/g' customization.cfg
          sed -i 's/_NOLIB32="wow64"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_NOLIB32="true"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_NOCCACHE="false"/_NOCCACHE="true"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_PKGNAME_OVERRIDE=""/_PKGNAME_OVERRIDE="none"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_sdl_joy_support="false"/_sdl_joy_support="true"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_user_patches_no_confirm="false"/_user_patches_no_confirm="true"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_build_faudio="false"/_build_faudio="true"/g' customization.cfg
          sed -i 's/pacman -S\${_confirm_str} --needed/pacman -S\${_confirm_str} --needed --noconfirm/' wine-tkg-scripts/deps

      - name: Copy custom patches
        working-directory: /home/runner/work/
        run: |
          if [ -d "$GITHUB_WORKSPACE/patches" ]; then
            cp "$GITHUB_WORKSPACE/patches"/*.mypatch wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/ 2>/dev/null || true
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/winegstreamer_nv12_buffer_fix.mypatch
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/opencl_linux_fix.mypatch
            echo "Removed proton-specific and local-test patches for gwine build"
          fi

      - name: Start build
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/
        run: |
          ( yes | ./non-makepkg-build.sh ) || true

      - name: Show prepare.log on failure
        if: failure()
        run: |
          echo "=== prepare.log ==="
          PREPARE_LOG=$(find / -maxdepth 5 -name "prepare.log" -path "*/wine-tkg*" 2>/dev/null | head -1)
          if [ -n "$PREPARE_LOG" ]; then cat "$PREPARE_LOG"; else echo "prepare.log not found"; fi
          echo "=== End of prepare.log ==="

      - name: Package
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/non-makepkg-builds/
        run: |
          BUILD_DIR=$(ls -d wine-tkg-git-*.g* | head -n 1)
          VERSION=$(echo "$BUILD_DIR" | sed 's/^wine-tkg-git-//')
          mv "$BUILD_DIR" "gwine-$VERSION"
          tar cJvf "gwine-$VERSION.tar.xz" "gwine-$VERSION"
          mv "gwine-$VERSION.tar.xz" "/tmp/gwine-$VERSION.tar.xz"
          echo "EXTRACTED_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "gwine-${{ env.EXTRACTED_VERSION }}"
          name: "Gwine ${{ env.EXTRACTED_VERSION }}"
          files: "/tmp/gwine-${{ env.EXTRACTED_VERSION }}.tar.xz"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const gwineReleases = releases
              .filter(r => r.tag_name.startsWith('gwine-') && !r.tag_name.startsWith('gwine-proton-'))
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            const releasesToDelete = gwineReleases.slice(3);

            for (const release of releasesToDelete) {
              console.log(`Deleting ${release.tag_name} (${release.name})`);
              await github.rest.repos.deleteRelease({ owner: context.repo.owner, repo: context.repo.repo, release_id: release.id });
              try {
                await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${release.tag_name}` });
              } catch (error) { console.log(`Cannot delete tag ${release.tag_name}: ${error.message}`); }
            }

  build-gwine-proton:
    name: Build gwine-proton
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: fedora:43

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          dnf install -y \
            git make ccache gcc-c++ mingw32-gcc mingw32-gcc-c++ mingw32-cpp \
            mingw64-gcc mingw64-gcc-c++ mingw64-cpp \
            wayland-devel sdl2-compat-devel openal-soft-devel opencl-headers ocl-icd-devel \
            libvkd3d-devel icoutils vulkan-loader-devel vulkan-headers \
            lcms2-devel mpg123-devel libva-devel fontforge gsm-devel \
            libjpeg-turbo-devel systemd-devel libv4l-devel pulseaudio-libs-devel \
            xz audiofile-devel giflib-devel ImageMagick-devel libpcap-devel \
            alsa-lib-devel autoconf bison coreutils cups-devel dbus-devel \
            desktop-file-utils flex fontconfig-devel freetype-devel freeglut-devel \
            gawk gettext-devel gnutls-devel krb5-devel libattr-devel \
            libpng-devel librsvg2-devel libstdc++-devel libtiff-devel \
            libX11-devel libXcomposite-devel libXcursor-devel libXext-devel \
            libXi-devel libXinerama-devel libxml2-devel libXmu-devel \
            libXrandr-devel libXrender-devel libxslt-devel libXxf86vm-devel \
            mesa-libGL-devel mesa-libEGL-devel ncurses-devel openldap-devel \
            sane-backends-devel unixODBC-devel unzip util-linux \
            zlib-ng-compat-devel wget2 python3-pefile rust cargo glslang patch \
            libgcrypt-devel libXpresent-devel yasm jq pkgconf-pkg-config \
            gcc nasm patchelf curl tar libdrm-devel libxkbcommon-devel \
            libunwind-devel vulkan-devel meson libatomic

          dnf install -y gstreamer1-devel gstreamer1-plugins-base-devel gtk3-devel

          dnf install -y \
            pkgconf.i686 gcc-c++.i686 glibc-devel.i686 libX11-devel.i686 \
            wayland-devel.i686 libXcomposite-devel.i686 \
            libXcursor-devel.i686 libXext-devel.i686 libXi-devel.i686 \
            libXinerama-devel.i686 libxml2-devel.i686 libXmu-devel.i686 \
            libXrandr-devel.i686 libXrender-devel.i686 libxslt-devel.i686 \
            libXxf86vm-devel.i686 mesa-libGL-devel.i686 mesa-libEGL-devel.i686 \
            ncurses-devel.i686 openldap-devel.i686 freetype-devel.i686 \
            sdl2-compat-devel.i686 openal-soft-devel.i686 libvkd3d-devel.i686 \
            lcms2-devel.i686 libva-devel.i686 giflib-devel.i686 libpcap-devel.i686 \
            alsa-lib-devel.i686 cups-devel.i686 dbus-devel.i686 \
            fontconfig-devel.i686 libjpeg-turbo-devel.i686 libpng-devel.i686 \
            pulseaudio-libs-devel.i686 gnutls-devel.i686 krb5-devel.i686 \
            krb5-libs.i686 libstdc++-devel.i686 vulkan-loader-devel.i686 \
            libv4l-devel.i686 gsm-devel.i686 sane-backends-devel.i686 \
            libXfixes-devel.i686 libgcrypt-devel.i686 libXpresent-devel.i686 \
            libdrm-devel.i686 libglvnd-devel.i686 libunwind-devel.i686 \
            libxkbcommon-devel.i686 zlib-ng-compat-devel.i686 mpg123-devel.i686 \
            orc-devel.i686 sysprof-capture-devel.i686 libffi-devel.i686 \
            pcre2-devel.i686 libgudev-devel.i686 mesa-libgbm-devel.i686 \
            libxcb-devel.i686 elfutils-devel.i686 libXau-devel.i686 \
            systemd-devel.i686 libzstd-devel.i686 libcap-devel.i686 ocl-icd-devel.i686 libatomic.i686 \
            libXdamage-devel.i686 libXtst-devel.i686 nettle-devel.i686 \
            libmount-devel.i686 libselinux-devel.i686 libblkid-devel.i686

          mkdir -p /tmp/i686-rpms
          dnf download --destdir=/tmp/i686-rpms --resolve glib2-devel.i686 gstreamer1-devel.i686 gstreamer1-plugins-base-devel.i686 gtk3-devel.i686 2>/dev/null || true
          if ls /tmp/i686-rpms/*.rpm 1>/dev/null 2>&1; then
            rpm -ivh --replacefiles --nodeps /tmp/i686-rpms/*.rpm 2>/dev/null || true
          fi
          rm -rf /tmp/i686-rpms

      - name: Build FFmpeg for winedmo
        run: |
          FFMPEG_VER="8.1"
          FFMPEG_SRC="/tmp/ffmpeg-${FFMPEG_VER}"
          curl -L "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VER}.tar.xz" | tar xJ -C /tmp

          FFMPEG64_OPTS="--enable-shared --disable-static --disable-programs --disable-doc --disable-inline-asm --disable-all --enable-avcodec --enable-avfilter --enable-avutil --enable-swresample --enable-avformat --enable-swscale --enable-bsfs --enable-zlib --enable-protocol=file --enable-filter=scale --enable-decoder=vc1,vc1image,wmv3,wmv3image,wmv2,wmv1,wmav1,wmav2,wmapro,wmalossless,xma1,xma2 --enable-decoder=h264,hevc,aac,mp3,flac,mpeg4,mpegvideo,mpeg1video,msmpeg4v1,msmpeg4v2,msmpeg4v3 --enable-decoder=gif,apng,mp2,indeo5,adpcm_ms,alac,vorbis,cinepak,msvideo1,msrle,adpcm_ima_wav,ac3,eac3,rawvideo,opus,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_mulaw,pcm_alaw --enable-demuxer=asf,avi,xwma,matroska,mp4,aac,ogg,mov,mp3,flac,wav,flv,mpegts,mpeg --enable-muxer=asf,asf_stream,flv,mp4,dash,webm,mpegts --enable-parser=mpeg4video,h264,hevc,vc1,ac3,mpegvideo"
          FFMPEG32_OPTS="--enable-shared --disable-static --disable-programs --disable-doc --disable-inline-asm --disable-all --enable-avcodec --enable-avfilter --enable-avutil --enable-swresample --enable-avformat --enable-swscale --enable-bsfs --enable-zlib --enable-protocol=file --enable-filter=scale --enable-decoder=vc1,vc1image,wmv3,wmv3image,wmv2,wmv1,wmav1,wmav2,wmapro,wmalossless,xma1,xma2 --enable-decoder=h264,hevc,aac,mp3,flac,mpeg4,mpegvideo,mpeg1video,msmpeg4v1,msmpeg4v2,msmpeg4v3 --enable-decoder=gif,apng,mp2,indeo5,adpcm_ms,alac,vorbis,cinepak,msvideo1,msrle,adpcm_ima_wav,ac3,eac3,rawvideo,opus,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_mulaw,pcm_alaw --enable-demuxer=asf,avi,xwma,matroska,mp4,aac,ogg,mov,mp3,flac,wav,flv,mpegts,mpeg --enable-muxer=asf,asf_stream,flv,mp4,dash,webm,mpegts --enable-parser=mpeg4video,h264,hevc,vc1,ac3,mpegvideo"
          if rpm -q zlib-ng-compat-devel.i686 &>/dev/null; then FFMPEG32_OPTS="$FFMPEG32_OPTS --enable-zlib"; fi

          cd "${FFMPEG_SRC}"
          FFMPEG64_PREFIX="/opt/ffmpeg64"
          ./configure \
            --prefix="${FFMPEG64_PREFIX}" \
            --libdir="${FFMPEG64_PREFIX}/lib" \
            ${FFMPEG64_OPTS} \
            --target-os=linux \
            --arch=x86_64
          make -j$(nproc)
          make install
          make distclean 2>/dev/null || true

          cd "${FFMPEG_SRC}"
          FFMPEG32_PREFIX="/opt/ffmpeg32"
          export PKG_CONFIG_PATH="/usr/lib/pkgconfig"
          export CFLAGS="-m32"
          export LDFLAGS="-m32 -L/usr/lib"
          ./configure \
            --prefix="${FFMPEG32_PREFIX}" \
            --libdir="${FFMPEG32_PREFIX}/lib" \
            ${FFMPEG32_OPTS} \
            --target-os=linux \
            --arch=x86_32 \
            --host-cflags="-m32" \
            --host-ldflags="-m32 -L/usr/lib"
          make -j$(nproc)
          make install

          cp /opt/ffmpeg64/lib/pkgconfig/*.pc /usr/lib64/pkgconfig/
          cp /opt/ffmpeg32/lib/pkgconfig/*.pc /usr/lib/pkgconfig/
          cp /opt/gst64/lib64/pkgconfig/gstreamer*.pc /usr/lib64/pkgconfig/
          cp /opt/gst32/lib/pkgconfig/gstreamer*.pc /usr/lib/pkgconfig/

          echo "/opt/ffmpeg64/lib" > /etc/ld.so.conf.d/ffmpeg64.conf
          echo "/opt/ffmpeg32/lib" > /etc/ld.so.conf.d/ffmpeg32.conf
          echo "/opt/gst64/lib64" > /etc/ld.so.conf.d/gst64.conf
          echo "/opt/gst32/lib" > /etc/ld.so.conf.d/gst32.conf
          ldconfig

          for f in /opt/ffmpeg64/lib/libav*.so.* /opt/ffmpeg64/lib/libsw*.so.*; do
            patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
          done
          for f in /opt/ffmpeg32/lib/libav*.so.* /opt/ffmpeg32/lib/libsw*.so.*; do
            patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
          done

      - name: Build GStreamer for winegstreamer
        run: |
          GST_VER="1.28.2"
          git clone --depth 1 --branch "${GST_VER}" https://gitlab.freedesktop.org/gstreamer/gstreamer.git /tmp/gstreamer
          cd /tmp/gstreamer

          sed -i "s/have_sse41 = cc.has_argument(sse41_args) and host_machine.cpu_family() == 'x86_64'/have_sse41 = false/g" subprojects/gst-plugins-base/meson.build
          rm -f subprojects/openh264.wrap subprojects/vpx.wrap subprojects/libvmaf.wrap subprojects/glib.wrap

          mv /usr/lib64/glib-2.0/include/glibconfig.h /usr/lib64/glib-2.0/include/glibconfig.h.x64
          mv /usr/lib64/pkgconfig /usr/lib64/pkgconfig.x64

          PKG_CONFIG_PATH="/opt/ffmpeg32/lib/pkgconfig:/usr/lib/pkgconfig" \
          CFLAGS="-m32 -msse" CXXFLAGS="-m32 -msse" LDFLAGS="-m32 -L/usr/lib" \
          meson setup build32 \
            --prefix=/opt/gst32 \
            --libdir=/opt/gst32/lib \
            --buildtype=release \
            -Dugly=enabled \
            -Dwebrtc=disabled \
            -Dorc:orc-target=sse,mmx,avx \
            -Dwerror=false \
            -Dgstreamer:ptp-helper=disabled \
            -Dgst-plugins-base:pango=disabled \
            -Dgst-plugins-base:gl=disabled \
            -Dgst-plugins-good:gtk3=disabled \
            -Dgst-plugins-good:cairo=disabled \
            -Dgst-plugins-good:gdk-pixbuf=disabled \
            -Dgst-plugins-good:adaptivedemux2=disabled \
            -Dgst-plugins-bad:dtls=disabled \
            -Dtests=disabled \
            -Dexamples=disabled
          meson compile -C build32 -j$(nproc)
          meson install -C build32

          mv /usr/lib64/pkgconfig.x64 /usr/lib64/pkgconfig
          mv /usr/lib64/glib-2.0/include/glibconfig.h.x64 /usr/lib64/glib-2.0/include/glibconfig.h
          rm -rf build32

          PKG_CONFIG_PATH="/opt/ffmpeg64/lib/pkgconfig:/usr/lib64/pkgconfig" \
          meson setup build64 \
            --prefix=/opt/gst64 \
            --libdir=/opt/gst64/lib64 \
            --buildtype=release \
            -Dugly=enabled \
            -Dwebrtc=disabled \
            -Dorc:orc-target=sse,mmx,avx \
            -Dwerror=false
          meson compile -C build64 -j$(nproc)
          meson install -C build64
          rm -rf /tmp/gstreamer

      - name: Clone wine-tkg-git repo and configure
        working-directory: /home/runner/work/
        run: |
          git clone https://github.com/Frogging-Family/wine-tkg-git.git
          cd wine-tkg-git/wine-tkg-git
          sed -i 's/_LOCAL_PRESET=""/_LOCAL_PRESET="valve-exp-bleeding"/g' customization.cfg
          sed -i 's/_NOLIB32="wow64"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_NOLIB32="true"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/^_configure_userargs64=""/_configure_userargs64="--without-dbus --with-ffmpeg"/' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/^_configure_userargs32=""/_configure_userargs32="--without-dbus --with-ffmpeg"/' wine-tkg-profiles/advanced-customization.cfg
          sed -i 's/_nomakepkg_dependency_autoresolver="true"/_nomakepkg_dependency_autoresolver="false"/' customization.cfg
          sed -i 's/_build_faudio="false"/_build_faudio="true"/g' customization.cfg
          sed -i 's/_build_mediaconv="false"/_build_mediaconv="true"/g' customization.cfg
          sed -i 's/_user_patches_no_confirm="false"/_user_patches_no_confirm="true"/' wine-tkg-profiles/advanced-customization.cfg

      - name: Copy custom patches
        working-directory: /home/runner/work/
        run: |
          if [ -d "$GITHUB_WORKSPACE/patches" ]; then
            cp "$GITHUB_WORKSPACE/patches"/*.mypatch wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/ 2>/dev/null || true
            rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/gamepad_axis_32bit_fix.mypatch
            echo "Copied custom patches (removed gwine-specific gamepad patch)"
          fi

      - name: Start build
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/
        run: |
          sed -i 's|_configure_args32+=(--libdir="$_prefix/$_lib32name")|_configure_args32+=(--libdir="$_prefix/$_lib64name")|' non-makepkg-build.sh
          ( yes | ./non-makepkg-build.sh ) || true

      - name: Show prepare.log on failure
        if: failure()
        run: |
          echo "=== prepare.log ==="
          PREPARE_LOG=$(find / -maxdepth 5 -name "prepare.log" -path "*/wine-tkg*" 2>/dev/null | head -1)
          if [ -n "$PREPARE_LOG" ]; then cat "$PREPARE_LOG"; else echo "prepare.log not found"; fi
          echo "=== End of prepare.log ==="

      - name: Package
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/non-makepkg-builds/
        run: |
          BUILD_DIR=$(ls -d wine-tkg* | head -n 1)
          VERSION=$(echo "$BUILD_DIR" | sed 's/^wine-tkg[^0-9]*\(.*\)$/\1/')
          mv "$BUILD_DIR" "gwine-proton-$VERSION"

          UNIX64=""
          UNIX32=""
          PE64=""
          PE32=""
          for d in "gwine-proton-$VERSION"/lib/wine/x86_64-unix "gwine-proton-$VERSION"/lib64/wine/x86_64-unix; do
            if [ -d "$d" ]; then UNIX64="$d"; break; fi
          done
          for d in "gwine-proton-$VERSION"/lib/wine/i386-unix "gwine-proton-$VERSION"/lib64/wine/i386-unix; do
            if [ -d "$d" ]; then UNIX32="$d"; break; fi
          done
          for d in "gwine-proton-$VERSION"/lib/wine/x86_64-windows "gwine-proton-$VERSION"/lib64/wine/x86_64-windows; do
            if [ -d "$d" ]; then PE64="$d"; break; fi
          done
          for d in "gwine-proton-$VERSION"/lib/wine/i386-windows "gwine-proton-$VERSION"/lib64/wine/i386-windows; do
            if [ -d "$d" ]; then PE32="$d"; break; fi
          done

          cp -a /opt/ffmpeg32/lib/libav*.so* /opt/ffmpeg32/lib/libsw*.so* "${UNIX32}/" 2>/dev/null || true
          cp -a /opt/ffmpeg64/lib/libav*.so* /opt/ffmpeg64/lib/libsw*.so* "${UNIX64}/" 2>/dev/null || true

          mkdir -p "gwine-proton-$VERSION/lib32/gstreamer-1.0" "gwine-proton-$VERSION/lib64/gstreamer-1.0"
          mkdir -p "gwine-proton-$VERSION/lib32/gst-libs" "gwine-proton-$VERSION/lib64/gst-libs" "gwine-proton-$VERSION/lib/gst-libs"
          cp -a /opt/gst32/lib/gstreamer-1.0/libgst*.so "gwine-proton-$VERSION/lib32/gstreamer-1.0/" 2>/dev/null || true
          cp -a /opt/gst64/lib64/gstreamer-1.0/libgst*.so "gwine-proton-$VERSION/lib64/gstreamer-1.0/" 2>/dev/null || true
          cp -a /opt/gst32/lib/libgst*-1.0.so* "gwine-proton-$VERSION/lib32/gst-libs/" 2>/dev/null || true
          cp -a /opt/gst64/lib64/libgst*-1.0.so* "gwine-proton-$VERSION/lib64/gst-libs/" 2>/dev/null || true
          cp -a /opt/gst32/lib/libgst*-1.0.so* "gwine-proton-$VERSION/lib/gst-libs/" 2>/dev/null || true

          UNIX32_RPATH=""
          for d in "gwine-proton-$VERSION"/lib/wine/i386-unix "gwine-proton-$VERSION"/lib32/wine/i386-unix; do
            if [ -d "$d" ]; then UNIX32_RPATH="${d#gwine-proton-$VERSION/}"; break; fi
          done
          UNIX64_RPATH=""
          for d in "gwine-proton-$VERSION"/lib/wine/x86_64-unix "gwine-proton-$VERSION"/lib64/wine/x86_64-unix; do
            if [ -d "$d" ]; then UNIX64_RPATH="${d#gwine-proton-$VERSION/}"; break; fi
          done
          for f in "gwine-proton-$VERSION/lib32/gstreamer-1.0/"libgst*.so; do [ -n "$UNIX32_RPATH" ] && patchelf --set-rpath "\$ORIGIN/../gst-libs:\$ORIGIN/../../${UNIX32_RPATH}" "$f" 2>/dev/null || true; done
          for f in "gwine-proton-$VERSION/lib64/gstreamer-1.0/"libgst*.so; do [ -n "$UNIX64_RPATH" ] && patchelf --set-rpath "\$ORIGIN/../gst-libs:\$ORIGIN/../../${UNIX64_RPATH}" "$f" 2>/dev/null || true; done

          for f in "${UNIX64}/"winegstreamer.so; do patchelf --set-rpath "\$ORIGIN:\$ORIGIN/../../lib64/gst-libs" "$f" 2>/dev/null || true; done
          for f in "${UNIX32}/"winegstreamer.so; do patchelf --set-rpath "\$ORIGIN:\$ORIGIN/../../lib32/gst-libs" "$f" 2>/dev/null || true; done

          mkdir -p /tmp/icu68 && \
          curl -L "https://github.com/unicode-org/icu/releases/download/release-68-2/icu4c-68_2-Win64-MSVC2019.zip" -o /tmp/icu68/win64.zip && \
          unzip -j /tmp/icu68/win64.zip "bin64/icuuc68.dll" "bin64/icuin68.dll" "bin64/icudt68.dll" -d /tmp/icu68 && \
          curl -L "https://github.com/unicode-org/icu/releases/download/release-68-2/icu4c-68_2-Win32-MSVC2019.zip" -o /tmp/icu68/win32.zip && \
          unzip -j /tmp/icu68/win32.zip "bin/icuuc68.dll" "bin/icuin68.dll" "bin/icudt68.dll" -d /tmp/icu68/win32 && \
          cp -a /tmp/icu68/icuuc68.dll /tmp/icu68/icuin68.dll /tmp/icu68/icudt68.dll "${PE64}/" && \
          cp -a /tmp/icu68/win32/icuuc68.dll /tmp/icu68/win32/icuin68.dll /tmp/icu68/win32/icudt68.dll "${PE32}/" && \
          rm -rf /tmp/icu68

          echo "Bundled FFmpeg, GStreamer plugins+libs, ICU 68 DLLs; FFmpeg .so rpath set (no rpath on winedmo.so)"

          tar cJvf "gwine-proton-$VERSION.tar.xz" "gwine-proton-$VERSION"
          mv "gwine-proton-$VERSION.tar.xz" "/tmp/gwine-proton-$VERSION.tar.xz"
          echo "EXTRACTED_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "gwine-proton-${{ env.EXTRACTED_VERSION }}"
          name: "Gwine Proton ${{ env.EXTRACTED_VERSION }}"
          files: "/tmp/gwine-proton-${{ env.EXTRACTED_VERSION }}.tar.xz"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const protonReleases = releases
              .filter(r => r.tag_name.startsWith('gwine-proton-'))
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            const releasesToDelete = protonReleases.slice(3);

            for (const release of releasesToDelete) {
              console.log(`Deleting ${release.tag_name} (${release.name})`);
              await github.rest.repos.deleteRelease({ owner: context.repo.owner, repo: context.repo.repo, release_id: release.id });
              try {
                await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${release.tag_name}` });
              } catch (error) { console.log(`Cannot delete tag ${release.tag_name}: ${error.message}`); }
            }
