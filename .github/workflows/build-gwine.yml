name: build-gwine

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.variant.display_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    continue-on-error: true
    container:
      image: artixlinux/artixlinux:latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: gwine
            display_name: "Build gwine"
            preset: none
            title: Gwine
            package_pattern: wine-tkg-git-*.g*
            setup_commands: |
              # Sync with local customization.cfg settings
              sed -i 's/_use_ntsync="false"/_use_ntsync="true"/g' customization.cfg
              sed -i 's/_use_fsync="true"/_use_fsync="false"/g' customization.cfg
              sed -i 's/_use_esync="true"/_use_esync="false"/g' customization.cfg
              sed -i 's/_wayland_driver="false"/_wayland_driver="true"/g' customization.cfg
              sed -i 's/_FS_bypass_compositor="false"/_FS_bypass_compositor="true"/g' customization.cfg
              sed -i 's/_proton_fs_hack="false"/_proton_fs_hack="true"/g' customization.cfg
              sed -i 's/_proton_mf_patches="false"/_proton_mf_patches="true"/g' customization.cfg
              sed -i 's/_msvcrt_nativebuiltin="false"/_msvcrt_nativebuiltin="true"/g' customization.cfg
              sed -i 's/_win10_default="false"/_win10_default="true"/g' customization.cfg
              sed -i 's/_protonify="false"/_protonify="true"/g' customization.cfg
              # Sync with local advanced-customization.cfg settings
              # Using non-wow64 mode (lib32) for full 32-bit support
              sed -i 's/_NOLIB32="wow64"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/_NOLIB32="true"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/_NOCCACHE="false"/_NOCCACHE="true"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/_PKGNAME_OVERRIDE=""/_PKGNAME_OVERRIDE="none"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/_sdl_joy_support="false"/_sdl_joy_support="true"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/_user_patches_no_confirm="false"/_user_patches_no_confirm="true"/g' wine-tkg-profiles/advanced-customization.cfg

          - name: gwine-proton
            display_name: "Build gwine-proton"
            preset: valve-exp-bleeding
            title: "Gwine Proton"
            package_pattern: wine-tkg*
            setup_commands: |
              # Using non-wow64 mode (lib32) for full 32-bit support
              sed -i 's/_NOLIB32="wow64"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/_NOLIB32="true"/_NOLIB32="false"/g' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/^_configure_userargs64=""/_configure_userargs64="--without-dbus"/' wine-tkg-profiles/advanced-customization.cfg
              sed -i 's/^_configure_userargs32=""/_configure_userargs32="--without-dbus"/' wine-tkg-profiles/advanced-customization.cfg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          # Initialize pacman keys
          pacman-key --init
          pacman-key --populate artix
          
          # Artix needs to be detected as Arch for wine-tkg dependency resolver
          sed -i 's/^ID=artix$/ID=arch/' /etc/os-release
          
          # Update mirrorlist with faster mirrors (tested: wheaton, unixpeople, clarkson are fastest)
          printf '%s\n' 'Server = https://artix.wheaton.edu/repos/$repo/os/$arch' 'Server = https://artix.unixpeople.org/repos/$repo/os/$arch' 'Server = https://mirror.clarkson.edu/artix-linux/repos/$repo/os/$arch' > /etc/pacman.d/mirrorlist
          
          # Enable lib32 repository for 32-bit libraries
          printf '\n[lib32]\nInclude = /etc/pacman.d/mirrorlist\n' >> /etc/pacman.conf
          
          # Install basic tools (wine-tkg resolver will handle the rest)
          pacman -Sy --noconfirm --needed base-devel git curl tar

      - name: Clone wine-tkg-git repo and configure variant
        working-directory: /home/runner/work/
        run: |
          git clone https://github.com/Frogging-Family/wine-tkg-git.git
          cd wine-tkg-git/wine-tkg-git
          sed -i 's/_LOCAL_PRESET=""/_LOCAL_PRESET="${{ matrix.variant.preset }}"/g' customization.cfg
          # Patch deps script to auto-select default provider
          sed -i 's/pacman -S\${_confirm_str} --needed/pacman -S\${_confirm_str} --needed --noconfirm/' wine-tkg-scripts/deps
          ${{ matrix.variant.setup_commands }}

      - name: Copy custom patches
        working-directory: /home/runner/work/
        run: |
          # Copy .mypatch files from patches directory
          if [ -d "$GITHUB_WORKSPACE/patches" ]; then
            # Copy patches applicable to all variants
            cp "$GITHUB_WORKSPACE/patches"/*.mypatch wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/ 2>/dev/null || true
            # Remove gwine-specific patches from proton builds
            if [[ "${{ matrix.variant.name }}" == gwine-proton* ]]; then
              rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/gamepad_axis_32bit_fix.mypatch
              echo "Removed gwine-specific patches for proton build"
            fi
            # Remove proton-specific patches from gwine builds
            if [[ "${{ matrix.variant.name }}" == "gwine" ]]; then
              rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/winegstreamer_cuda_memory_fix.mypatch
              rm -f wine-tkg-git/wine-tkg-git/wine-tkg-userpatches/restore_disable_sfn.mypatch
              echo "Removed proton-specific patches for gwine build"
            fi
            echo "Copied custom patches from patches directory"
          fi

      - name: Start build
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/
        run: |
          yes | ./non-makepkg-build.sh

      - name: Show prepare.log on failure
        if: failure()
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/
        run: |
          echo "=== prepare.log ==="
          cat prepare.log 2>/dev/null || echo "prepare.log not found"
          echo "=== End of prepare.log ==="

      - name: Package
        working-directory: /home/runner/work/wine-tkg-git/wine-tkg-git/non-makepkg-builds/
        run: |
          BUILD_DIR=$(ls -d ${{ matrix.variant.package_pattern }} | head -n 1)
          VERSION=$(echo "$BUILD_DIR" | sed 's/^wine-tkg[^0-9]*\(.*\)$/\1/')
          mv "$BUILD_DIR" "${{ matrix.variant.name }}-$VERSION"
          tar cJvf "${{ matrix.variant.name }}-$VERSION.tar.xz" "${{ matrix.variant.name }}-$VERSION"
          mv "${{ matrix.variant.name }}-$VERSION.tar.xz" "/tmp/${{ matrix.variant.name }}-$VERSION.tar.xz"
          echo "EXTRACTED_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ matrix.variant.name }}-${{ env.EXTRACTED_VERSION }}"
          name: "${{ matrix.variant.title }} ${{ env.EXTRACTED_VERSION }}"
          files: "/tmp/${{ matrix.variant.name }}-${{ env.EXTRACTED_VERSION }}.tar.xz"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const variants = {
              'gwine': [],
              'gwine-proton': []
            };

            releases.forEach(release => {
              if (release.tag_name.startsWith('gwine-proton-')) {
                variants['gwine-proton'].push(release);
              } else if (release.tag_name.startsWith('gwine-')) {
                variants['gwine'].push(release);
              }
            });

            for (const variant of Object.keys(variants)) {
              variants[variant].sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
              const releasesToDelete = variants[variant].slice(3);

              for (const release of releasesToDelete) {
                console.log(`Deleting ${release.tag_name} (${release.name})`);

                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });

                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${release.tag_name}`
                  });
                  console.log(`Tag ${release.tag_name} deleted`);
                } catch (error) {
                  console.log(`Cannot delete tag ${release.tag_name}: ${error.message}`);
                }
              }
            }
